<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#181820"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#1e1e36"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="16" y="16" width="1168" height="598" rx="12" fill="none" stroke="#363a4f" stroke-width="2"/>
  <rect x="32" y="32" width="1136" height="566" rx="8" fill="rgba(30,30,54,0.6)" stroke="#363a4f" stroke-width="1"/>
  <circle cx="60" cy="52" r="7" fill="#ed8796"/>
  <circle cx="84" cy="52" r="7" fill="#eed49f"/>
  <circle cx="108" cy="52" r="7" fill="#a6da95"/>
  <text x="600" y="58" fill="#6e6a86" font-size="18" text-anchor="middle" letter-spacing="1">riceme@github — bash</text>
  <text x="72" y="180" fill="#a6da95" font-size="72" font-weight="900" filter="url(#glow)">RiceMe</text>
  <text x="330" y="180" fill="#6e6a86" font-size="24" stroke="#363a4f" stroke-width="1">v1.0</text>
  <text x="72" y="260" fill="#8aadf4" font-size="32" font-weight="700" filter="url(#glow)">terminal aesthetic for your GitHub README</text>
  <text x="72" y="300" fill="#6e6a86" font-size="22">~ ❯ generate dynamic SVG cards with live stats</text>
  <g font-size="18">
    <text x="72" y="380" fill="#8bd5ca">&gt; 23+ themes</text>
    <text x="320" y="380" fill="#f5bde6">&gt; CRT effects</text>
    <text x="568" y="380" fill="#eed49f">&gt; Live GitHub stats</text>
    <text x="816" y="380" fill="#f5a97f">&gt; Customizable layout</text>
  </g>
  <rect x="32" y="540" width="1136" height="1" fill="#363a4f"/>
  <text x="600" y="570" fill="#494d64" font-size="16" text-anchor="middle">github.com/Solenad/riceme-readme-generator</text>
</svg>
